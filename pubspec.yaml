name: cst_mobile
description: "CST Student Portal & Maps – Integrated Flutter Project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # --- Existing Dependencies ---
  http: ^1.2.2
  shared_preferences: ^2.3.2
  file_picker: ^8.1.2
  http_parser: ^4.0.2
  socket_io_client: 3.1.4
  intl: ^0.19.0
  app_links: ^6.0.0
  url_launcher: ^6.2.0
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.2
  syncfusion_flutter_pdfviewer: 33.2.3 # Updated version for stability
  image_picker: ^1.0.7
  
  # --- Added: MapLibre & Navigation Features ---
  maplibre_gl: ^0.22.0
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  rxdart: ^0.28.0
  cupertino_icons: ^1.0.8
  flutter_tts: ^4.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Siguraduhing tama ang indentation dito
  assets:
    - assets/peopleImage/mr_otis_image_.jpeg
    - assets/peopleImage/mr_andrew_image.jpeg
    - assets/images/ # Dinagdag ito para sa mga map markers o icons